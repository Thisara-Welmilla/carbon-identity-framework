name: Comment on config file change

on:
  pull_request_target:
    branches:
      - master
      - next
    paths:
      - 'features/identity-core/org.wso2.carbon.identity.core.server.feature/resources/org.wso2.carbon.identity.core.server.feature.default.json'

jobs:
  review-comment:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post or skip inline review comment on file
        uses: actions/github-script@v7
        with:
          script: |
            const repo = context.repo;
            const baseUrl = `https://github.com/${repo.owner}/${repo.repo}/blob/master/features/identity-core/org.wso2.carbon.identity.core.server.feature/resources`;
            const defaultJsonUrl = `${baseUrl}/org.wso2.carbon.identity.core.server.feature.default.json`;
            const inferJsonUrl = `${baseUrl}/org.wso2.carbon.identity.core.server.feature.infer.json`;

            const MARKER = '<!-- config-migration-check -->';

            const commentBody = [
              MARKER,
              '> ⚠️ **Config Migration Check**',
              '',
              `This PR modifies [\`org.wso2.carbon.identity.core.server.feature.default.json\`](${defaultJsonUrl}).`,
              '',
              `Please make sure that the corresponding configurations are also added to [\`features/identity-core/org.wso2.carbon.identity.core.server.feature/resources/org.wso2.carbon.identity.core.server.feature.infer.json\`](${inferJsonUrl}), **if applicable**, to maintain **backward compatibility** during migration.`,
              '',
              '> [!NOTE]',
              `> The [\`infer.json\`](${inferJsonUrl}) file stores the default configuration values for each version in the same release line, based on the behavioral changes introduced in the upcoming release. This ensures that existing deployments continue to behave as before after upgrading.`
            ].join('\n');

            const existingComments = await github.rest.issues.listComments({
              owner: repo.owner,
              repo: repo.repo,
              issue_number: context.issue.number,
            });

            const alreadyPosted = existingComments.data.some(comment =>
              comment.body.includes(MARKER)
            );

            if (alreadyPosted) {
              console.log('Reminder comment already exists. Skipping.');
              return;
            }

            await github.rest.issues.createComment({
              owner: repo.owner,
              repo: repo.repo,
              issue_number: context.issue.number,
              body: commentBody,
            });

            console.log('Reminder comment posted.');
